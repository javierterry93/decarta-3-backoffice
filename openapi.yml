openapi: 3.0.3
info:
 title: Mi Carta Backoffice API
 description: |
  Contrato HTTP que debe implementar el backend (X) para conectar el backoffice
  de Mi Carta. Refleja el modelo de datos y las operaciones actuales de la app,
  organizado por entidad (Data, Product, Category, Image, Settings).

  El cliente puede obtener los datos completos con `GET /data` o usar los
  endpoints granulares por entidad.
 version: 1.0.0

servers:
 - url: /api
   description: API relativa al host del backend

tags:
 - name: Data
   description: Datos completos de la carta (entidad genérica Data)
 - name: Products
   description: Productos
 - name: Categories
   description: Categorías
 - name: Images
   description: Imágenes del menú
 - name: Settings
   description: Configuración del negocio

paths:
 /data:
  get:
   tags: [Data]
   summary: Obtener los datos completos de la carta
   operationId: getData
   responses:
    '200':
     description: Datos actuales
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/Data'

  delete:
   tags: [Data]
   summary: Borrar todos los datos de la carta
   description: |
    Elimina productos, categorías, imágenes y restaura la configuración del
    negocio a los valores por defecto. Acción irreversible.
   operationId: resetData
   responses:
    '204':
     description: Datos borrados
    '400':
     $ref: '#/components/responses/BadRequest'

 /products:
  get:
   tags: [Products]
   summary: Listar productos
   operationId: listProducts
   responses:
    '200':
     description: Lista de productos
     content:
      application/json:
       schema:
        type: array
        items:
         $ref: '#/components/schemas/Product'
  post:
   tags: [Products]
   summary: Crear producto
   operationId: createProduct
   requestBody:
    required: true
    content:
     application/json:
      schema:
       $ref: '#/components/schemas/ProductCreateInput'
   responses:
    '201':
     description: Producto creado
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/EntityIdResponse'
    '400':
     $ref: '#/components/responses/BadRequest'

 /products/import:
  post:
   tags: [Products]
   summary: Importar productos (p. ej. desde Excel)
   operationId: importProducts
   requestBody:
    required: true
    content:
     application/json:
      schema:
       $ref: '#/components/schemas/ProductImportRequest'
   responses:
    '201':
     description: Productos importados
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/ProductImportResponse'
    '400':
     $ref: '#/components/responses/BadRequest'

 /products/reorder:
  put:
   tags: [Products]
   summary: Reordenar productos dentro de una categoría
   operationId: reorderProducts
   requestBody:
    required: true
    content:
     application/json:
      schema:
       $ref: '#/components/schemas/ProductReorderRequest'
   responses:
    '204':
     description: Orden actualizado
    '400':
     $ref: '#/components/responses/BadRequest'
    '404':
     $ref: '#/components/responses/NotFound'

 /products/{productId}:
  parameters:
   - $ref: '#/components/parameters/ProductId'
  get:
   tags: [Products]
   summary: Obtener un producto
   operationId: getProduct
   responses:
    '200':
     description: Producto
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/Product'
    '404':
     $ref: '#/components/responses/NotFound'
  patch:
   tags: [Products]
   summary: Actualizar producto
   operationId: updateProduct
   requestBody:
    required: true
    content:
     application/json:
      schema:
       $ref: '#/components/schemas/ProductUpdateInput'
   responses:
    '200':
     description: Producto actualizado
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/Product'
    '400':
     $ref: '#/components/responses/BadRequest'
    '404':
     $ref: '#/components/responses/NotFound'
  delete:
   tags: [Products]
   summary: Eliminar producto
   operationId: deleteProduct
   responses:
    '204':
     description: Producto eliminado
    '404':
     $ref: '#/components/responses/NotFound'

 /products/{productId}/duplicate:
  parameters:
   - $ref: '#/components/parameters/ProductId'
  post:
   tags: [Products]
   summary: Duplicar producto
   operationId: duplicateProduct
   responses:
    '201':
     description: Copia creada
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/EntityIdResponse'
    '404':
     $ref: '#/components/responses/NotFound'

 /categories:
  get:
   tags: [Categories]
   summary: Listar categorías
   operationId: listCategories
   responses:
    '200':
     description: Lista de categorías
     content:
      application/json:
       schema:
        type: array
        items:
         $ref: '#/components/schemas/Category'
  post:
   tags: [Categories]
   summary: Crear categoría
   operationId: createCategory
   requestBody:
    required: true
    content:
     application/json:
      schema:
       $ref: '#/components/schemas/CategoryCreateInput'
   responses:
    '201':
     description: Categoría creada
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/EntityIdResponse'
    '400':
     $ref: '#/components/responses/BadRequest'

 /categories/reorder:
  put:
   tags: [Categories]
   summary: Reordenar categorías
   operationId: reorderCategories
   requestBody:
    required: true
    content:
     application/json:
      schema:
       $ref: '#/components/schemas/CategoryReorderRequest'
   responses:
    '204':
     description: Orden actualizado
    '400':
     $ref: '#/components/responses/BadRequest'

 /categories/resolve:
  post:
   tags: [Categories]
   summary: Resolver ID de categoría por nombre (crear si no existe)
   description: |
    Usado en importación Excel. Si `name` está vacío, devuelve la primera
    categoría. Si existe (comparación normalizada del nombre), devuelve su ID.
    Si no, crea una nueva.
   operationId: resolveCategoryId
   requestBody:
    required: true
    content:
     application/json:
      schema:
       $ref: '#/components/schemas/CategoryResolveRequest'
   responses:
    '200':
     description: ID resuelto
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/EntityIdResponse'
    '400':
     $ref: '#/components/responses/BadRequest'

 /categories/{categoryId}:
  parameters:
   - $ref: '#/components/parameters/CategoryId'
  get:
   tags: [Categories]
   summary: Obtener una categoría
   operationId: getCategory
   responses:
    '200':
     description: Categoría
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/Category'
    '404':
     $ref: '#/components/responses/NotFound'
  patch:
   tags: [Categories]
   summary: Actualizar categoría
   operationId: updateCategory
   requestBody:
    required: true
    content:
     application/json:
      schema:
       $ref: '#/components/schemas/CategoryUpdateInput'
   responses:
    '200':
     description: Categoría actualizada
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/Category'
    '400':
     $ref: '#/components/responses/BadRequest'
    '404':
     $ref: '#/components/responses/NotFound'
  delete:
   tags: [Categories]
   summary: Eliminar categoría
   description: |
    Los productos de la categoría eliminada deben reasignarse a otra
    categoría (p. ej. la primera disponible).
   operationId: deleteCategory
   responses:
    '204':
     description: Categoría eliminada
    '404':
     $ref: '#/components/responses/NotFound'

 /images:
  get:
   tags: [Images]
   summary: Listar imágenes
   operationId: listImages
   responses:
    '200':
     description: Lista de imágenes
     content:
      application/json:
       schema:
        type: array
        items:
         $ref: '#/components/schemas/MenuImage'
  post:
   tags: [Images]
   summary: Registrar imagen
   description: |
    El cliente optimiza la imagen y envía URLs (p. ej. data URL base64).
    El backend almacena `url` y `thumbnailUrl`.
   operationId: createImage
   requestBody:
    required: true
    content:
     application/json:
      schema:
       $ref: '#/components/schemas/ImageCreateInput'
   responses:
    '201':
     description: Imagen registrada
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/MenuImage'
    '400':
     $ref: '#/components/responses/BadRequest'

 /images/{imageId}:
  parameters:
   - $ref: '#/components/parameters/ImageId'
  get:
   tags: [Images]
   summary: Obtener una imagen
   operationId: getImage
   responses:
    '200':
     description: Imagen
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/MenuImage'
    '404':
     $ref: '#/components/responses/NotFound'
  delete:
   tags: [Images]
   summary: Eliminar imagen
   description: |
    Debe desvincular la imagen de los productos que la referencien
    (`imageId` → `null`).
   operationId: deleteImage
   responses:
    '204':
     description: Imagen eliminada
    '404':
     $ref: '#/components/responses/NotFound'

 /settings:
  get:
   tags: [Settings]
   summary: Obtener configuración del negocio
   operationId: getSettings
   responses:
    '200':
     description: Configuración
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/BusinessSettings'
  patch:
   tags: [Settings]
   summary: Actualizar configuración del negocio
   operationId: updateSettings
   requestBody:
    required: true
    content:
     application/json:
      schema:
       $ref: '#/components/schemas/BusinessSettingsUpdateInput'
   responses:
    '200':
     description: Configuración actualizada
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/BusinessSettings'
    '400':
     $ref: '#/components/responses/BadRequest'

components:
 parameters:
  ProductId:
   name: productId
   in: path
   required: true
   schema:
    type: string
   description: Identificador del producto
  CategoryId:
   name: categoryId
   in: path
   required: true
   schema:
    type: string
   description: Identificador de la categoría
  ImageId:
   name: imageId
   in: path
   required: true
   schema:
    type: string
   description: Identificador de la imagen

 responses:
  BadRequest:
   description: Petición inválida
   content:
    application/json:
     schema:
      $ref: '#/components/schemas/ErrorResponse'
  NotFound:
   description: Recurso no encontrado
   content:
    application/json:
     schema:
      $ref: '#/components/schemas/ErrorResponse'

 schemas:
  Data:
   type: object
   description: Todos los datos del negocio (la carta completa)
   required:
    - products
    - categories
    - images
    - settings
    - lastModified
   properties:
    products:
     type: array
     items:
      $ref: '#/components/schemas/Product'
    categories:
     type: array
     items:
      $ref: '#/components/schemas/Category'
    images:
     type: array
     items:
      $ref: '#/components/schemas/MenuImage'
    settings:
     $ref: '#/components/schemas/BusinessSettings'
    lastModified:
     type: string
     format: date-time
     description: ISO 8601 de la última modificación del menú

  Product:
   type: object
   required:
    - id
    - name
    - categoryId
    - order
    - price
    - shortDescription
    - visible
    - imageId
    - createdAt
    - updatedAt
   properties:
    id:
     type: string
    name:
     type: string
    categoryId:
     type: string
    order:
     type: integer
     minimum: 1
     description: Orden dentro de la categoría
    price:
     type: number
     format: double
     minimum: 0
    shortDescription:
     type: string
    visible:
     type: boolean
    imageId:
     type: string
     nullable: true
    createdAt:
     type: string
     format: date-time
    updatedAt:
     type: string
     format: date-time

  ProductCreateInput:
   type: object
   properties:
    name:
     type: string
     default: ''
    categoryId:
     type: string
     description: Si se omite, usa la primera categoría disponible
    price:
     type: number
     format: double
     minimum: 0
     default: 0
    shortDescription:
     type: string
     default: ''
    visible:
     type: boolean
     default: true
    imageId:
     type: string
     nullable: true
     default: null

  ProductUpdateInput:
   type: object
   description: Campos parciales del producto
   properties:
    name:
     type: string
    categoryId:
     type: string
     description: Al cambiar categoría, el backend recalcula `order`
    order:
     type: integer
     minimum: 1
    price:
     type: number
     format: double
     minimum: 0
    shortDescription:
     type: string
    visible:
     type: boolean
    imageId:
     type: string
     nullable: true

  ProductImportItem:
   type: object
   required:
    - name
    - categoryId
    - price
    - shortDescription
    - visible
    - imageId
   properties:
    name:
     type: string
    categoryId:
     type: string
    price:
     type: number
     format: double
     minimum: 0
    shortDescription:
     type: string
    visible:
     type: boolean
    imageId:
     type: string
     nullable: true

  ProductImportRequest:
   type: object
   required:
    - items
   properties:
    items:
     type: array
     minItems: 1
     items:
      $ref: '#/components/schemas/ProductImportItem'

  ProductImportResponse:
   type: object
   required:
    - importedCount
   properties:
    importedCount:
     type: integer
     minimum: 0

  ProductReorderRequest:
   type: object
   required:
    - categoryId
    - orderedIds
   properties:
    categoryId:
     type: string
    orderedIds:
     type: array
     description: IDs de productos en el nuevo orden (solo los de esa categoría)
     items:
      type: string

  Category:
   type: object
   required:
    - id
    - name
    - order
    - visible
   properties:
    id:
     type: string
    name:
     type: string
    order:
     type: integer
     minimum: 1
    visible:
     type: boolean

  CategoryCreateInput:
   type: object
   properties:
    name:
     type: string
     default: ''

  CategoryUpdateInput:
   type: object
   properties:
    name:
     type: string
    order:
     type: integer
     minimum: 1
    visible:
     type: boolean

  CategoryReorderRequest:
   type: object
   required:
    - orderedIds
   properties:
    orderedIds:
     type: array
     items:
      type: string

  CategoryResolveRequest:
   type: object
   properties:
    name:
     type: string
     default: ''
     description: Nombre de categoría a buscar o crear

  MenuImage:
   type: object
   required:
    - id
    - name
    - createdAt
   properties:
    id:
     type: string
    name:
     type: string
    url:
     type: string
     description: URL pública (solo en modo remoto)
    thumbnailUrl:
     type: string
     description: URL del thumbnail (solo en modo remoto)
    createdAt:
     type: string
     format: date-time

  ImageCreateInput:
   type: object
   required:
    - name
   properties:
    name:
     type: string
    url:
     type: string
     description: Imagen completa (modo remoto)
    thumbnailUrl:
     type: string
     description: Thumbnail (modo remoto)

  BusinessSettings:
   type: object
   required:
    - name
    - logoImageId
    - phone
    - address
    - hours
    - socialInstagram
    - socialFacebook
    - socialTwitter
   properties:
    name:
     type: string
    logoImageId:
     type: string
     nullable: true
     description: ID de imagen en la biblioteca
    phone:
     type: string
    address:
     type: string
    hours:
     type: string
    socialInstagram:
     type: string
    socialFacebook:
     type: string
    socialTwitter:
     type: string

  BusinessSettingsUpdateInput:
   type: object
   properties:
    name:
     type: string
    logoImageId:
     type: string
     nullable: true
    phone:
     type: string
    address:
     type: string
    hours:
     type: string
    socialInstagram:
     type: string
    socialFacebook:
     type: string
    socialTwitter:
     type: string

  EntityIdResponse:
   type: object
   required:
    - id
   properties:
    id:
     type: string

  ErrorResponse:
   type: object
   required:
    - message
   properties:
    message:
     type: string
    code:
     type: string
     description: Código de error opcional para el cliente

 securitySchemes:
  bearerAuth:
   type: http
   scheme: bearer
   bearerFormat: JWT
   description: Reservado para cuando el backend exija autenticación

# Descomentar cuando el backend requiera auth:
# security:
#   - bearerAuth: []
